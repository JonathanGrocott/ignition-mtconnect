name: Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: wrapper

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build module
      run: ./gradlew clean :mtconnect-build:build

    - name: Upload module artifact
      uses: actions/upload-artifact@v4
      with:
        name: mtconnect-module
        path: mtconnect-build/build/*.modl
        retention-days: 30
