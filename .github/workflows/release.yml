name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: wrapper

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build module
      run: ./gradlew clean :mtconnect-build:build

    - name: Get version from gradle.properties
      id: get_version
      run: |
        VERSION=$(grep "^moduleVersion=" gradle.properties | cut -d'=' -f2)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Module version: $VERSION"

    - name: Find .modl file
      id: find_modl
      run: |
        MODL_FILE=$(find mtconnect-build/build -name "*.unsigned.modl" -type f | head -1)
        echo "MODL_FILE=$MODL_FILE" >> $GITHUB_ENV
        echo "Found module file: $MODL_FILE"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'SNAPSHOT') }}
        body: |
          ## MTConnect Module
          Version: ${{ env.VERSION }}

          ### Installation
          1. Download the .modl file below
          2. Install it in Ignition via Config > Modules > Install or Upgrade a Module

          ### Changes
          See the commit history for details on changes in this release.
        files: |
          ${{ env.MODL_FILE }}
